<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Preguntas – AJ Games</title>
    <meta name="description" content="Panel de revisión de preguntas de AJ Games." />
    <meta name="author" content="Aleix Auqué" />
    <meta name="robots" content="noindex, nofollow" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Russo+One&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/preguntas.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="nav-bar">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-controller fs-4 text-warning"></i>
        <span class="nav-logo">AJ GAMES</span>
      </div>
      <div class="nav-buttons d-flex gap-2">
        <button class="nav-btn" onclick="goTo('index.html')"><img src="img/Triviaicon.png" class="nav-ruleta-icon" alt=""> Family Trivia</button>
        <button class="nav-btn" onclick="goTo('ruletas.html')"><img src="img/ruleta.png" class="nav-ruleta-icon" alt=""> Ruletas</button>
        <button class="nav-btn" onclick="goTo('cashdrop.html')"><img src="img/CashDropIcon.png" class="nav-ruleta-icon" alt=""> Cash Drop</button>
        <button class="nav-btn active">📋 Preguntas</button>
      </div>
    </nav>

    <div class="pq-wrap">

      <!-- Header -->
      <div class="pq-header">
        <h1 class="pq-title"><i class="bi bi-list-check me-2"></i>Preguntas</h1>
        <div id="pqStats" class="pq-stats"></div>
      </div>

      <!-- Pool switcher -->
      <div class="pq-pool-tabs">
        <button class="pool-btn active" data-pool="main"  onclick="switchPool('main')">📋 Preguntas</button>
        <button class="pool-btn"        data-pool="extra" onclick="switchPool('extra')">⭐ Preguntas Extra</button>
      </div>

      <!-- Filters -->
      <div class="pq-filters">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <button class="filter-btn" data-filter="ok">✓ Vistas</button>
        <button class="filter-btn" data-filter="bad">✗ Revisar</button>
        <button class="filter-btn" data-filter="none">⏳ Pendientes</button>
        <button class="filter-btn filter-reset" onclick="resetAll()"><i class="bi bi-trash"></i> Limpiar marcas</button>
      </div>

      <!-- Questions rendered by JS -->
      <div id="questionsContainer"></div>

    </div>

    <script src="js/questions-data.js"></script>
    <script src="js/questions-data-extra.js"></script>
    <script src="js/preguntas.js"></script>
  </body>
</html>
