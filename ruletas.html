<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ruletas – AJ Games</title>
    <meta name="description" content="Forma equipos al azar con las ruletas giratorias de AJ Games antes de empezar la partida." />
    <meta name="author" content="Aleix Auqué" />
    <meta name="robots" content="index, follow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ruletas – AJ Games" />
    <meta property="og:description" content="Forma equipos al azar con las ruletas giratorias de AJ Games antes de empezar la partida." />
    <meta property="og:image" content="img/ruletaTitle.png" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Russo+One&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="ruletas-page">
    <!-- Navbar -->
    <nav class="nav-bar">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-controller fs-4 text-warning"></i>
        <span class="nav-logo">AJ GAMES</span>
      </div>
      <div class="nav-buttons d-flex gap-2">
        <button class="nav-btn test" onclick="goTo('index.html')"><img src="img/Triviaicon.png" class="nav-ruleta-icon" alt=""> FamilyTrivia</button>
        <button class="nav-btn" onclick="goTo('cashdrop.html')"><img src="img/CashDropIcon.png" class="nav-ruleta-icon" alt=""> CashDrop</button>
      </div>
    </nav>

    <div class="wrap container-xl">
      <!-- Title -->
      <div class="text-center">
        <img src="img/ruletaTitle.png" class="game-title-img game-title-img--lg" alt="Ruletas" />
      </div>

      <!-- Wheels grid -->
      <div class="row g-4 justify-content-center">

        <!-- Wheel A -->
        <div class="col-12 col-lg-6">
          <div class="wheel-card" id="wheelCardA">
            <div class="wheel-title">Ruleta 1</div>
            <div class="canvas-wrap">
              <div class="winner-display" id="winnerDisplayA">—</div>
              <div class="pointer" id="pointerA"></div>
              <canvas id="canvasA" class="wheel-canvas" width="360" height="360"></canvas>
            </div>

            <div class="input-row d-flex gap-2">
              <input class="form-control" id="inputA" placeholder="Introduce un nombre y pulsa Añadir" />
              <button id="addA"><i class="bi bi-plus-lg"></i> Añadir</button>
            </div>

            <div class="names-list" id="listA"></div>

            <div class="controls">
              <button class="spin-btn" id="spinA"><i class="bi bi-arrow-clockwise me-1"></i>Girar</button>
              <button class="clear-btn" id="clearA"><i class="bi bi-trash me-1"></i>Limpiar</button>
            </div>
          </div>
        </div>

        <!-- Wheel B -->
        <div class="col-12 col-lg-6">
          <div class="wheel-card" id="wheelCardB">
            <div class="wheel-title">Ruleta 2</div>
            <div class="canvas-wrap">
              <div class="winner-display" id="winnerDisplayB">—</div>
              <div class="pointer" id="pointerB"></div>
              <canvas id="canvasB" class="wheel-canvas" width="360" height="360"></canvas>
            </div>

            <div class="input-row d-flex gap-2">
              <input class="form-control" id="inputB" placeholder="Introduce un nombre y pulsa Añadir" />
              <button id="addB"><i class="bi bi-plus-lg"></i> Añadir</button>
            </div>

            <div class="names-list" id="listB"></div>

            <div class="controls">
              <button class="spin-btn" id="spinB"><i class="bi bi-arrow-clockwise me-1"></i>Girar</button>
              <button class="clear-btn" id="clearB"><i class="bi bi-trash me-1"></i>Limpiar</button>
            </div>
          </div>
        </div>

      </div>

      <!-- Spin both wheels -->
      <div class="spin-both-container">
        <button id="spinBothBtn" class="spin-btn">
          <i class="bi bi-arrow-clockwise me-1"></i><span id="spinBothLabel">Girar las dos ruletas a la vez</span>
        </button>
        <button class="btn-salas-primary btn-salas-primary--lg" onclick="goTo('index.html?start=1')">
          <i class="bi bi-play-fill"></i> ¡Empezar!
        </button>
      </div>

      <!-- Formed teams panel -->
      <div class="teams-panel-wrapper">
        <div class="teams-panel-wget">
          <div class="wheel-card">
            <div class="wheel-title">Equipos Formados</div>
            <div id="teamsList" class="names-list"></div>
            <button id="clearTeamsBtn" class="clear-btn d-block mx-auto">
              <i class="bi bi-trash me-1"></i>Limpiar todos los equipos
            </button>
          </div>
        </div>
      </div>

    </div>

    <!-- Team formed popup -->
    <div id="teamPopup">
      <div class="team-popup-card">
        <div class="team-popup-label" id="teamPopupLabel"></div>
        <div class="team-popup-names" id="teamPopupNames"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmwz+ysmXdQS32vBX8sMMd1bGvu7u" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
    <script src="js/footer.js"></script>
  </body>
</html>
